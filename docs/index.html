<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anyrouter Status</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">STATUS PAGE</p>
          <h1>Anyrouter Status</h1>
          <p class="subtitle">主状态按 CLI 兼容探针判定；合成探针只作为对照，避免假绿灯。</p>
        </div>
        <div class="meta">
          <span id="lastUpdated">加载中...</span>
        </div>
      </header>

      <section id="overallBanner" class="banner banner-neutral">
        正在加载状态...
      </section>
      <section id="freshnessAlert" class="freshness freshness-hidden" hidden>
        监控数据加载中...
      </section>

      <section class="grid">
        <article class="card">
          <div class="card-header">
            <div>
              <h2 id="serviceName">Anyrouter Claude CLI Compatibility</h2>
              <p id="serviceSubLabel" class="muted">CLI 兼容探针（主状态）</p>
            </div>
            <span id="servicePill" class="pill pill-neutral">No data</span>
          </div>
          <div class="metrics">
            <div class="metric">
              <span class="metric-label">HTTP Status</span>
              <strong id="httpStatus">-</strong>
            </div>
            <div class="metric">
              <span class="metric-label">吐出 token</span>
              <strong id="tokenOk">-</strong>
            </div>
            <div class="metric">
              <span class="metric-label">响应耗时</span>
              <strong id="latencyMs">-</strong>
            </div>
            <div class="metric">
              <span class="metric-label">目标模型</span>
              <strong id="targetModel">-</strong>
            </div>
          </div>
          <div class="detail-list">
            <div>
              <span class="detail-label">最近 token</span>
              <code id="lastToken">-</code>
            </div>
            <div>
              <span class="detail-label">错误信息</span>
              <code id="errorMessage">-</code>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="card-header">
            <div>
              <h2>探针对照</h2>
              <p class="muted">主状态看 CLI 兼容探针，合成探针只用于定位网关兼容差异</p>
            </div>
          </div>
          <div id="probeMatrix" class="probe-matrix"></div>
        </article>

        <article class="card">
          <div class="card-header">
            <div>
              <h2>最近 7 天</h2>
              <p class="muted">按小时聚合，共 168 格</p>
            </div>
            <span id="uptimeValue" class="uptime-value">-</span>
          </div>
          <div id="uptimeGrid" class="uptime-grid" aria-label="7 day uptime grid"></div>
          <div class="legend">
            <span><i class="dot dot-green"></i> 正常</span>
            <span><i class="dot dot-yellow"></i> 部分失败</span>
            <span><i class="dot dot-red"></i> 故障</span>
            <span><i class="dot dot-gray"></i> 无数据</span>
          </div>
        </article>
      </section>
    </main>

    <div id="gridTooltip" class="grid-tooltip" hidden></div>
    <script src="./app.js"></script>
  </body>
</html>
