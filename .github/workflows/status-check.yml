name: anyrouter-status-check

on:
  workflow_dispatch:
  schedule:
    - cron: "2,12,22,32,42,52 * * * *"

concurrency:
  group: anyrouter-status-check
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  probe-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe and persist data
        env:
          ANYROUTER_API_BASE: ${{ secrets.ANYROUTER_API_BASE }}
          ANYROUTER_API_KEY: ${{ secrets.ANYROUTER_API_KEY }}
          ANYROUTER_MODEL: ${{ secrets.ANYROUTER_MODEL }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          attempt=1
          max_attempts=3

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Publish attempt $attempt/$max_attempts"

            git fetch origin main
            git reset --hard origin/main

            python scripts/check_anyrouter.py

            git add docs/data/status.json docs/data/history.json
            if git diff --cached --quiet; then
              echo "No data changes to commit"
              break
            fi

            git commit -m "chore(status): refresh anyrouter probe data"

            if git push origin HEAD:main; then
              echo "Publish succeeded"
              break
            fi

            echo "Push failed; retrying on top of the latest origin/main"
            attempt=$((attempt + 1))
          done

          if [ "$attempt" -gt "$max_attempts" ]; then
            echo "Failed to publish data after $max_attempts attempts" >&2
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
